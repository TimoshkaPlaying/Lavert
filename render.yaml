services:
  - type: web
    name: levart-chat-beta
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 -b 0.0.0.0:$PORT server.server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: STATE_SYNC_TO_OBJECT_STORAGE
        value: "1"
      - key: STATE_SYNC_STRICT
        value: "1"
      - key: STORAGE_FALLBACK_LOCAL
        value: "0"
