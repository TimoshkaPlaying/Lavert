<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Levart Messenger</title>
<link rel="stylesheet" href="/static/style.css?v=20260223t">
</head>

<body class="center">
<div id="appLoader">
    <div class="app-loader-card">
        <div class="app-loader-logo">LEVART</div>
        <div class="app-loader-text" id="appLoaderText">Запуск приложения...</div>
        <div class="app-loader-bar"><span></span></div>
    </div>
</div>
<script>
(() => {
    const hide = () => {
        const loader = document.getElementById('appLoader');
        if (loader) loader.classList.add('hidden');
    };
    window.addEventListener('load', () => setTimeout(hide, 1200), { once: true });
    window.addEventListener('error', () => setTimeout(hide, 0));
    window.addEventListener('unhandledrejection', () => setTimeout(hide, 0));
    setTimeout(hide, 8000);
})();
</script>
<div id="toast-container"></div>
<div class="card">

<h1>LEVART</h1>

<p class="subtitle">
Безопасный зашифрованный мессенджер
</p>

<button onclick="location.href='/login'">Войти</button>
<button class="secondary" onclick="location.href='/register'">Регистрация</button>

</div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script type="module" src="/static/script.js?v=20260223t"></script>
</body>
</html>
